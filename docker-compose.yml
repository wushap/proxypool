services:
  proxypool:
    build:
      context: .
    image: proxypool:local
    container_name: proxypool
    init: true
    network_mode: host
    restart: unless-stopped
    command:
      - uvicorn
      - proxypool.main:app
      - --host
      - ${PROXYPOOL_WEBUI_HOST:-0.0.0.0}
      - --port
      - ${PROXYPOOL_WEBUI_PORT:-18080}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PROXYPOOL_WEBUI_PORT:-18080}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    environment:
      PROXYPOOL_DB_PATH: /app/data/proxies.db
      PROXYPOOL_WEBUI_HOST: ${PROXYPOOL_WEBUI_HOST:-0.0.0.0}
      PROXYPOOL_WEBUI_PORT: ${PROXYPOOL_WEBUI_PORT:-18080}
      PROXYPOOL_OUTPUT_DIR: /app/output
      PROXYPOOL_SOURCES_FILE: /app/configs/sources.txt
      PROXYPOOL_SINGBOX_ROUTES_FILE: /app/configs/singbox-routes.json
      PROXYPOOL_SINGBOX_RUNTIME_CONFIG: /app/data/runtime/singbox.json
      PROXYPOOL_SINGBOX_RUNTIME_LOG: /app/data/runtime/singbox.log
      PROXYPOOL_SINGBOX_BINARY: /app/bin/sing-box
      PROXYPOOL_MIHOMO_BINARY: /app/bin/mihomo
      PROXYPOOL_MIHOMO_RUNTIME_DIR: /app/data/runtime/mihomo
      PROXYPOOL_API_KEY: ${PROXYPOOL_API_KEY:-}
      PROXYPOOL_HTTP_GATEWAY_DEFAULT_HOST: ${PROXYPOOL_HTTP_GATEWAY_DEFAULT_HOST:-0.0.0.0}
      PROXYPOOL_HTTP_GATEWAY_DEFAULT_PORT: ${PROXYPOOL_HTTP_GATEWAY_DEFAULT_PORT:-18899}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./configs:/app/configs
      - ./bin:/app/bin:ro
